name: Build Cheat Engine

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Pin to exactly 2.2.2 — CE's README explicitly requires this version.
      # Newer Lazarus (3.x, 4.x) breaks the build in multiple ways.
      # Do NOT pass --primary-config-path or --userdir overrides to lazbuild;
      # setup-lazarus already writes a correct environmentoptions.xml that
      # knows where lazutils (laz_avl_Tree) and all other packages live.
      - name: Install Lazarus 2.2.2
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: '2.2.2'
          with-cache: false   # caching is broken for Windows in this action

      # The cross-compiler is required because CE's release build mode targets
      # win32 as well. Without it lazbuild fails when it hits the 32-bit target.
      - name: Install FPC cross-compiler (win32 target)
        shell: pwsh
        run: |
          $url = "https://sourceforge.net/projects/lazarus/files/Lazarus%20Windows%2064%20bits/Lazarus%202.2.2/lazarus-2.2.2-fpc-3.2.2-cross-i386-win32-win64.exe/download"
          $out = "$env:TEMP\laz-cross.exe"
          Write-Host "Downloading cross-compiler..."
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Installing cross-compiler silently..."
          Start-Process -FilePath $out -ArgumentList "/verysilent","/norestart" -Wait
          Write-Host "Done."

      - name: Build Cheat Engine
        shell: cmd
        run: |
          lazbuild -B --build-mode=Release "Cheat Engine\cheatengine.lpi"

      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Cheat-Engine
          path: |
            Cheat Engine/bin/
