name: Build Cheat Engine

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Lazarus 2.2.2
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: '2.2.2'
          with-cache: false

      # setup-lazarus installs Lazarus source + binaries but does NOT
      # pre-compile the packages. The .ppu files for lazutils, LCL, synedit
      # etc. don't exist yet, so lazbuild can't resolve laz_avl_Tree.
      # "make all" compiles every package into .ppu files first.
      - name: Pre-compile Lazarus packages
        shell: pwsh
        run: |
          # Discover where setup-lazarus actually installed Lazarus
          $lazDir = (Get-Command lazbuild).Source | Split-Path
          Write-Host "Lazarus dir: $lazDir"

          $fpcExe = Get-ChildItem "$lazDir\fpc" -Recurse -Filter "fpc.exe" |
                    Where-Object { $_.FullName -like "*x86_64-win64*" } |
                    Select-Object -First 1 -ExpandProperty FullName
          Write-Host "FPC: $fpcExe"

          $fpcDir = $fpcExe | Split-Path | Split-Path | Split-Path

          Push-Location $lazDir
          & make all FPC="$fpcExe" FPCDIR="$fpcDir"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location

      - name: Build Cheat Engine
        shell: cmd
        run: lazbuild -B --build-mode=Release "Cheat Engine\cheatengine.lpi"

      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Cheat-Engine
          path: Cheat Engine/bin/
