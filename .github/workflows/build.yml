name: Build Cheat Engine

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Lazarus 2.2.2
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: '2.2.2'
          with-cache: false

      # SourceForge /download URLs are redirect pages, not direct file links.
      # curl follows all redirects and handles SourceForge mirrors correctly.
      - name: Install FPC cross-compiler (i386-win32)
        shell: cmd
        run: |
          curl -L -o "%TEMP%\laz-cross.exe" "https://sourceforge.net/projects/lazarus/files/Lazarus%%20Windows%%2064%%20bits/Lazarus%%202.2.2/lazarus-2.2.2-fpc-3.2.2-cross-i386-win32-win64.exe/download"
          "%TEMP%\laz-cross.exe" /verysilent /norestart

      # setup-lazarus installs Lazarus files but does NOT pre-compile the packages.
      # Without running "make all" first, the lazutils/lcl/synedit .ppu files don't
      # exist yet, so lazbuild cannot resolve laz_avl_Tree and other units.
      - name: Pre-compile Lazarus packages (make all)
        shell: cmd
        run: |
          set LAZDIR=D:\a\_temp\installers\lazarus
          set FPC=%LAZDIR%\fpc\3.2.2\bin\x86_64-win64\fpc.exe
          set FPCDIR=%LAZDIR%\fpc\3.2.2
          cd /d %LAZDIR%
          make all FPC="%FPC%" FPCDIR="%FPCDIR%"

      - name: Build Cheat Engine
        shell: cmd
        run: |
          lazbuild -B --build-mode=Release "Cheat Engine\cheatengine.lpi"

      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Cheat-Engine
          path: Cheat Engine/bin/
