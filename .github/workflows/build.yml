name: Build Cheat Engine

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Lazarus 2.2.2 + cross-compiler directly via the official installers.
      # We use the FreePascal mirror (mirrors.ibiblio.org) instead of SourceForge
      # because SourceForge uses multi-hop redirects that break in CI environments.
      - name: Install Lazarus 2.2.2
        shell: pwsh
        run: |
          $mirror = "https://mirrors.ibiblio.org/pub/mirrors/sourceforge/l/la/lazarus"
          $base   = "$mirror/Lazarus%20Windows%2064%20bits/Lazarus%202.2.2"

          Write-Host "Downloading Lazarus 2.2.2 main installer..."
          Invoke-WebRequest "$base/lazarus-2.2.2-fpc-3.2.2-win64.exe" -OutFile "$env:TEMP\laz.exe"

          Write-Host "Downloading Lazarus 2.2.2 cross-compiler (i386-win32)..."
          Invoke-WebRequest "$base/lazarus-2.2.2-fpc-3.2.2-cross-i386-win32-win64.exe" -OutFile "$env:TEMP\laz-cross.exe"

          Write-Host "Installing main Lazarus..."
          Start-Process "$env:TEMP\laz.exe" -ArgumentList "/verysilent", "/norestart", "/dir=C:\lazarus" -Wait

          Write-Host "Installing cross-compiler..."
          Start-Process "$env:TEMP\laz-cross.exe" -ArgumentList "/verysilent", "/norestart", "/dir=C:\lazarus" -Wait

          Write-Host "Done. Lazarus installed to C:\lazarus"

      - name: Add Lazarus and FPC to PATH
        shell: pwsh
        run: |
          $lazDir = "C:\lazarus"
          $fpcBin = "$lazDir\fpc\3.2.2\bin\x86_64-win64"
          echo "$lazDir"  | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "$fpcBin"  | Out-File -FilePath $env:GITHUB_PATH -Append

      # The Lazarus installer ships with pre-compiled .ppu files for all
      # core packages (lazutils, LCL, synedit, etc.) when installed from
      # the official installer — unlike gcarreno/setup-lazarus which only
      # extracts sources. So lazbuild can resolve laz_avl_Tree immediately.
      - name: Build Cheat Engine
        shell: cmd
        run: |
          set LAZARUSDIR=C:\lazarus
          set PATH=%LAZARUSDIR%;%LAZARUSDIR%\fpc\3.2.2\bin\x86_64-win64;%PATH%
          lazbuild -B --build-mode=Release "Cheat Engine\cheatengine.lpi"

      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Cheat-Engine
          path: Cheat Engine/bin/
