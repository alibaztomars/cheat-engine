name: Build Cheat Engine

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Lazarus and Free Pascal
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: 'stable'

    - name: Build Cheat Engine Dependencies and Main App
      run: |
        cd "Cheat Engine"
        # --add-package lazutils ekleyerek bulamadığı unit hatasını bypass ediyoruz
        lazbuild --add-package lazutils
        lazbuild --primary-config-path=. cheatengine.lpi --build-mode=Release

    - name: Upload Compiled Binary
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Cheat-Engine
        path: |
          Cheat Engine/bin/
